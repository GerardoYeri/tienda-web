<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda DLS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 min-h-screen p-6 relative">

<!-- ☰ Botón menú -->
<button id="abrirMenu"
  class="fixed top-6 left-6 z-50 bg-blue-600 text-white px-4 py-2 rounded-lg shadow-lg hover:bg-blue-700 font-semibold">
  ☰ MENÚ
</button>

<!-- 📂 Menú lateral -->
<div id="menuLateral"
  class="fixed top-0 left-0 h-full w-72 bg-white shadow-xl transform -translate-x-full transition-transform duration-300 z-40 flex flex-col">

  <!-- Cabecera -->
  <div class="p-4 border-b flex justify-between items-center bg-gray-100">
    <h2 class="font-bold text-lg">MENÚ</h2>
    <button id="cerrarMenu" class="text-red-600 font-bold text-lg">✕</button>
  </div>

  <!-- Lista con scroll -->
  <div id="listaSecciones"
       class="flex-1 overflow-y-auto p-4 flex flex-col gap-2">
  </div>

</div>
  <!-- 🏪 Header -->
  <header class="relative w-full flex items-center justify-center mb-8 px-6">

  <!-- Tarjeta de contacto a la izquierda -->
  <div class="absolute left-6 top-1/2 transform -translate-y-1/2 bg-white shadow-lg rounded-xl p-4 border border-gray-200 text-left w-70">
    <h2 class="text-lg font-semibold text-gray-700 mb-2">Contacto</h2>
    <p class="text-gray-600"><strong>📞 Cel:</strong> +54 9 353 564 9674</p>
    <p class="text-gray-600"><strong>🏠 Domicilio:</strong> Salta 259 - Villa Maria, Cordoba</p>
  </div>

  <!-- Logo y título centrados -->
  <div class="flex flex-col items-center justify-center text-center">
    <img src="imagenes/dls.png" alt="Logo DLS" width="200" class="mb-2">
    <h1 class="text-2xl font-semibold text-gray-700">Todo lo que buscas está aquí...</h1>
  </div>

</header>

  <!-- 🔍 Buscador -->
  <div class="max-w-4xl mx-auto mb-8">
    <input id="buscador" type="text" placeholder="Buscar productos..."
      class="w-full p-3 rounded-lg border border-gray-300 shadow-sm focus:ring-2 focus:ring-blue-400 outline-none" />
  </div>
  <div class="flex flex-col items-center justify-center text-center font-semibold mb-8">
    Materia prima para reposteria, pasteleria y chocolateria - Descartables para gastronomia		
    - Cotillon e Impresiones 3D		
  </div>

  <!-- 🛒 Carrito flotante -->
  <div id="carritoContenedor" class="fixed top-6 right-6 z-50">
    <button id="toggleCarrito"
      class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-full shadow-lg hover:bg-blue-700 transition">
      🛍️ Tu Carrito
      <span id="contadorCarrito"
        class="bg-white text-blue-700 font-bold px-2 rounded-full text-sm">0</span>
    </button>

    <!-- Contenido del carrito -->
    <div id="carrito" class="hidden mt-3 bg-white text-gray-800 w-80 rounded-lg shadow-xl p-4">
      <h2 class="text-lg font-semibold mb-3 text-center border-b pb-2">🛒 Carrito de compras</h2>
      <div id="listaCarrito" class="space-y-2 max-h-60 overflow-y-auto"></div>
      <div class="border-t mt-3 pt-3 flex justify-between items-center font-semibold">
        <span>Total:</span>
        <span id="totalCarrito">$0</span>
      </div>
      <button id="finalizarCompra"
    class="mt-4 w-full flex items-center justify-center gap-2 bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
       alt="WhatsApp"
       class="w-5 h-5">
  Finalizar compra
</button>
    </div>
  </div>

 <button id="subirArriba"
class="fixed bottom-6 right-6 bg-blue-600 text-white w-20 h-20 rounded-full shadow-lg hover:bg-blue-700 flex items-center justify-center text-3xl z-50">
⬆️
</button>

  <!-- 🧱 Productos -->
  <div id="productos" class="flex flex-wrap gap-6 justify-center"></div>


  <script type="module" src="app.js"></script>
</body>

</html>
